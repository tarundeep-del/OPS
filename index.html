<!DOCTYPE html>
<html lang="en">
<head>
  <title>OPS Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    /* ✅ 1. LIGHT THEME COLORS */
    :root {
      --bg: #f8fafc;        /* Light grey background */
      --surface: #ffffff;   /* White cards */
      --surface2: #f1f5f9;  /* Slightly off-white for headers */
      --border: rgba(0,0,0,0.08); /* Dark border for visibility */
      --accent: #f97316;
      --accent2: #fb923c;
      --accent-glow: rgba(249,115,22,0.18);
      --text: #0f172a;      /* Dark text */
      --muted: #64748b;     /* Grey text */
      --success: #10b981;
      --danger: #ef4444;
      --info: #3b82f6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse 60% 40% at 80% 20%, rgba(249,115,22,0.04) 0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 10% 80%, rgba(96,165,250,0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 230px;
      min-width: 230px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 28px 16px;
      position: relative;
      z-index: 10;
    }
    .custom-logo {
      width: 140px; 
      height: auto; 
      max-height: 50px;
      object-fit: contain;
      display: block;
      margin-left: 10px; 
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 8px 28px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }

    .menu-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      padding: 0 10px;
      margin-bottom: 8px;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.03em;
      transition: all 0.18s ease;
      position: relative;
    }

    .menu-item:hover {
      background: rgba(0,0,0,0.04); /* Adjusted for light theme */
      color: var(--text);
    }

    .menu-item.active {
      background: var(--accent-glow);
      color: var(--accent);
      font-weight: 500;
    }

    .menu-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 60%;
      background: var(--accent);
      border-radius: 0 2px 2px 0;
    }

    .menu-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.5;
      flex-shrink: 0;
    }

    .menu-item.active .menu-dot { opacity: 1; }

    .sidebar-footer {
      margin-top: auto;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.05em;
    }

    /* ── MAIN ── */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 28px 30px;
      position: relative;
      z-index: 1;
    }

    .main::-webkit-scrollbar { width: 4px; }
    .main::-webkit-scrollbar-track { background: transparent; }
    .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .header-left h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 26px;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1;
    }

    .header-left .subtitle {
      margin-top: 5px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.2);
      border-radius: 20px;
      font-size: 10px;
      color: var(--success);
      letter-spacing: 0.08em;
    }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── FILTERS ── */
    .filters {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .filter-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 10px;
      height: 36px;
    }

    .filter-group input[type="date"] {
      background: transparent;
      border: none;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      outline: none;
      padding: 0;
      height: 100%;
    }

    .filter-sep {
      color: var(--muted);
      font-size: 10px;
    }

    .btn {
      height: 36px;
      padding: 0 16px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.18s ease;
    }

    .btn:hover {
      background: var(--accent2);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px var(--accent-glow);
    }

    .btn:active { transform: translateY(0); }

    /* ── KPI CARDS / SLOTS ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); /* Made slightly wider for slots */
      gap: 16px;
      margin-bottom: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 16px;
      position: relative;
      overflow: hidden;
      transition: transform 0.18s, box-shadow 0.18s;
      animation: fadeUp 0.4s ease both;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.06); /* Lighter shadow for light theme */
    }

    .card-label {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--text);
      margin-bottom: 12px;
    }

    .card-value {
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      font-size: 32px;
      color: var(--text);
      line-height: 1;
    }

    .card-change {
      margin-top: 8px;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .card-bg {
      position: absolute;
      right: -10px;
      bottom: -10px;
      font-size: 60px;
      opacity: 0.03;
      line-height: 1;
      pointer-events: none;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── CHARTS ROW ── */
    .charts-row {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      animation: fadeUp 0.5s ease 0.1s both;
    }

    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .chart-title {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.02em;
    }

    .chart-tag {
      font-size: 9px;
      padding: 3px 8px;
      border-radius: 20px;
      background: var(--accent-glow);
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    canvas {
      border-radius: 4px;
      max-height: 200px;
    }

    /* ── TABLE ── */
    .table-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      animation: fadeUp 0.5s ease 0.15s both;
    }

    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .table-title {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 13px;
    }

    .table-count {
      font-size: 10px;
      color: var(--muted);
      background: var(--surface2);
      padding: 3px 8px;
      border-radius: 20px;
    }

    .table-wrap {
      overflow-x: auto;
      max-height: 280px;
      overflow-y: auto;
    }

    .table-wrap::-webkit-scrollbar { width: 4px; height: 4px; }
    .table-wrap::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }

    thead {
      position: sticky;
      top: 0;
      background: var(--surface2);
      z-index: 2;
    }

    th {
      padding: 10px 16px;
      text-align: left;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
      white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      white-space: nowrap;
    }

    tbody tr:last-child td { border-bottom: none; }

    tbody tr:hover td {
      background: rgba(0,0,0,0.02); /* Light theme hover */
    }

    /* Loading / Empty States */
    .state-msg {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.05em;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 10px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.8); /* Light theme overlay */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      gap: 12px;
      backdrop-filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .loading-overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .loading-text {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }
  </style>
</head>

<body>

<div class="loading-overlay" id="loader">
  <div class="spinner"></div>
  <div class="loading-text">FETCHING DATA...</div>
</div>

<div class="sidebar">
  <div class="logo-wrap">
    <img src="./LOGO.avif" alt="Company Logo" class="custom-logo">
  </div>

  <div class="menu-label">Navigation</div>
  <div class="menu" id="menu">
    <div class="menu-item active" onclick="loadPage('main')" data-page="main">
      <span class="menu-dot"></span> Overview
    </div>
    <div class="menu-item" onclick="loadPage('Sales')" data-page="Sales">
      <span class="menu-dot"></span> Sales
    </div>
    <div class="menu-item" onclick="loadPage('Marketing')" data-page="Marketing">
      <span class="menu-dot"></span> Marketing
    </div>
    <div class="menu-item" onclick="loadPage('Product')" data-page="Product">
      <span class="menu-dot"></span> Product
    </div>
    <div class="menu-item" onclick="loadPage('Finance')" data-page="Finance">
      <span class="menu-dot"></span> Finance
    </div>
    <div class="menu-item" onclick="loadPage('Accounts')" data-page="Accounts">
      <span class="menu-dot"></span> Accounts
    </div>
    <div class="menu-item" onclick="loadPage('Supply Chain')" data-page="Supply Chain">
      <span class="menu-dot"></span> Supply Chain
    </div>
    <div class="menu-item" onclick="loadPage('HR')" data-page="HR">
      <span class="menu-dot"></span> HR
    </div>
    <div class="menu-item" onclick="loadPage('CSAT')" data-page="CSAT">
      <span class="menu-dot"></span> CSAT
    </div>
  </div>

  <div class="sidebar-footer">
    v2.0 · OPS Platform
  </div>
</div>

<div class="main">

  <div class="header">
    <div class="header-left">
      <h1 id="title">Overview</h1>
      <div class="subtitle" id="subtitle">All departments · Consolidated view</div>
    </div>
    <div class="live-badge">
      <div class="live-dot"></div> LIVE
    </div>
  </div>

  <div class="filters">
    <span class="filter-label">Period</span>
    <div class="filter-group">
      <input type="date" id="start" />
      <span class="filter-sep">→</span>
      <input type="date" id="end" />
    </div>
    <button class="btn" onclick="applyFilter()">↻ Refresh</button>
  </div>

  <div class="grid" id="kpis">
    <div class="state-msg"><div class="spinner"></div></div>
  </div>

  <div id="charts-area"></div>

  <div class="table-card" id="raw-data-section">
    <div class="table-header">
      <div class="table-title">Raw Data</div>
      <div class="table-count" id="row-count">— rows</div>
    </div>
    <div class="table-wrap">
      <table id="table">
        <thead></thead>
        <tbody><tr><td colspan="99"><div class="state-msg">Loading...</div></td></tr></tbody>
      </table>
    </div>
  </div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxqM_jClfPETd7I7eDXXiCGQvs3RRzgBpQNUjh8mrh_wymG6DNabMOnQarSZxpODiVn/exec";

const OVERVIEW_SHEETS = [
  { key: "Sales",        label: "Sales",        color: "#f97316", icon: "◈" },
  { key: "Marketing",    label: "Marketing",    color: "#60a5fa", icon: "◉" },
  { key: "Accounts",     label: "Accounts",     color: "#ec4899", icon: "◇" },
  { key: "Finance",      label: "Finance",      color: "#34d399", icon: "◆" },
  { key: "Product",      label: "Product",      color: "#a78bfa", icon: "▲" },
  { key: "Supply Chain", label: "Supply Chain", color: "#fb923c", icon: "●" },
  { key: "HR",           label: "HR",           color: "#f87171", icon: "■" },
  { key: "CSAT",         label: "CSAT",         color: "#facc15", icon: "▶" },
];

const SKIP_COLS = new Set(['date','day','week','month','year','period','name','label','category','type','id','source','channel','region','department','team']);

let currentSheet = "main";
let activeCharts = [];

// Chart Defaults updated for Light Theme
Chart.defaults.color = '#64748b';
Chart.defaults.borderColor = 'rgba(0,0,0,0.05)';
Chart.defaults.font.family = "'DM Mono', monospace";
Chart.defaults.font.size = 10;

/* ── Helpers ── */
function setLoading(on) { document.getElementById('loader').classList.toggle('show', on); }

function setActive(page) {
  document.querySelectorAll('.menu-item').forEach(el =>
    el.classList.toggle('active', el.dataset.page === page));
}

function isMetricCol(col, val) {
  if (SKIP_COLS.has((col||'').toLowerCase().trim())) return false;
  return !isNaN(parseFloat(val));
}

function fmtNum(n) {
  return n >= 1e6 ? (n/1e6).toFixed(1)+'M'
       : n >= 1e3 ? (n/1e3).toFixed(1)+'K'
       : n.toLocaleString(undefined, {maximumFractionDigits:1});
}

function destroyCharts() {
  activeCharts.forEach(c => { try { c.destroy(); } catch(e){} });
  activeCharts = [];
}

/* ── Fetch ── */
async function fetchSheet(sheetName) {
  const start = document.getElementById('start').value;
  const end = document.getElementById('end').value;
  const nonce = Math.random().toString(36).slice(2) + Date.now();
  
  let url = `${API}?action=getData&sheet=${encodeURIComponent(sheetName)}&_=${nonce}`;
  
  if (start && end) {
    url += `&start=${encodeURIComponent(start)}&end=${encodeURIComponent(end)}`;
  }

  const res = await fetch(url, { cache: 'no-store' });
  
  const contentType = res.headers.get("content-type");
  if (!contentType || !contentType.includes("application/json")) {
    throw new Error("Server did not return JSON.");
  }

  const raw = await res.json();
  return Array.isArray(raw) ? raw : [];
}

/* ── Navigation ── */
async function loadPage(sheet) {
  currentSheet = sheet;
  setActive(sheet);
  destroyCharts();

  const meta = {
    'main':         ['Overview',      'All departments · Consolidated view'],
    'Sales':        ['Sales',         'Daily performance metrics'],
    'Marketing':    ['Marketing',     'Campaign & acquisition data'],
    'Product':      ['Product',       'Feature & engagement metrics'],
    'Accounts':     ['Accounts',      'Payables, receivables & cash flow'],
    'Finance':      ['Finance',       'Revenue, costs & margins'],
    'Supply Chain': ['Supply Chain',  'Inventory & logistics data'],
    'HR':           ['HR',            'Headcount & people metrics'],
    'CSAT':         ['CSAT',          'Customer satisfaction & operations'],
  };
  const [title, sub] = meta[sheet] || [sheet, ''];
  document.getElementById('title').textContent = title;
  document.getElementById('subtitle').textContent = sub;

  if (sheet === 'main') {
    await loadMainDashboard();
  } else {
    await loadDepartment(sheet);
  }
}

/* ── OVERVIEW ── */
async function loadMainDashboard() {
  setLoading(false); 
  
  // Hide raw data table on overview page
  document.getElementById('raw-data-section').style.display = 'none';

  // ✅ 2 & 3. Build Number Slots for Overview
  buildOverviewSkeletons();
  document.getElementById('kpis').innerHTML = ''; // Hide KPI bar on overview

  const allResults = [];

  const promises = OVERVIEW_SHEETS.map(s =>
    fetchSheet(s.key)
      .then(data => {
        const r = { ...s, data };
        allResults.push(r);
        fillOverviewCard(r); // Now populates numbers, not graphs!                                       
      })
      .catch(() => {
        markCardError(s.key);
      })
  );

  await Promise.all(promises);
}

/* ── ✅ 3. Build Skeletons (Now renders number slots instead of chart canvas) ── */
function buildOverviewSkeletons() {
  const area = document.getElementById('charts-area');
  area.innerHTML = '';
  const grid = document.createElement('div');
  grid.id = 'overview-grid';
  grid.className = 'grid'; // Uses your existing beautiful card grid layout
  area.appendChild(grid);

  OVERVIEW_SHEETS.forEach(s => {
    const id = s.key.replace(/\s+/g,'-');
    const card = document.createElement('div');
    card.className = 'card';
    card.id = `dept-card-${id}`;
    
    // Create the slot UI
    card.innerHTML = `
      <div class="card-label" style="color:${s.color}">${s.label}</div>
      <div class="card-value" id="val-${id}">
        <div class="spinner" style="width:16px;height:16px;border-width:2px;margin:0"></div>
      </div>
      <div class="card-change" id="metric-name-${id}">Loading...</div>
      <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${s.color}"></div>
      <div class="card-bg">${s.icon}</div>
    `;
    grid.appendChild(card);
  });
}

/* ── ✅ 3. Fill Overview Cards (Just updates the numbers, no graphs!) ── */
function fillOverviewCard(r) {
  const id = r.key.replace(/\s+/g,'-');
  const valEl = document.getElementById(`val-${id}`);
  const nameEl = document.getElementById(`metric-name-${id}`);
  
  if (!valEl) return;

  if (!r.data || !r.data.length) {
    valEl.textContent = '—';
    nameEl.textContent = 'No Data';
    return;
  }

  // Find the primary metric for this department
  const metricKey = Object.keys(r.data[0]).find(k => isMetricCol(k, r.data[0][k]));
  if (!metricKey) { 
    valEl.textContent = '—';
    nameEl.textContent = 'No Metrics';
    return; 
  }

  // Calculate sum of the metric
  const nums = r.data.map(d => parseFloat(d[metricKey])).filter(v => !isNaN(v));
  const sum = nums.reduce((a,b)=>a+b,0);

  // Update UI with the number
  valEl.textContent = fmtNum(sum);
  nameEl.textContent = metricKey; // Shows which metric is being displayed below the number
}

function markCardError(key) {
  const id = key.replace(/\s+/g,'-');
  const valEl = document.getElementById(`val-${id}`);
  const nameEl = document.getElementById(`metric-name-${id}`);
  if (valEl) { 
    valEl.textContent = 'Error';
    valEl.style.fontSize = '18px';
    valEl.style.color = 'var(--danger)';
    nameEl.textContent = 'Failed to load';
  }
}

/* ── Dept page ── */
async function loadDepartment(sheet) {
  setLoading(true);
  
  // Show raw data table and charts area when viewing a specific department
  document.getElementById('raw-data-section').style.display = 'block';
  document.getElementById('charts-area').innerHTML = ''; // Clear overview slots

  try {
    const data = await fetchSheet(sheet);
    setLoading(false);
    if (!data.length) { showError(); return; }
    
    // Render everything specifically for the department
    renderKPIs(data);
    renderDeptCharts(data, sheet);
    renderTable(data);
  } catch(e) {
    setLoading(false);
    showError();
  }
}

function applyFilter() { loadPage(currentSheet); }
function showError() { document.getElementById('kpis').innerHTML = `<div class="state-msg">⚠ Could not load data</div>`; }

/* ── KPI cards (Visible only on Department views) ── */
function renderKPIs(data) {
  const container = document.getElementById("kpis");
  container.innerHTML = "";
  if (!data.length) return;

  const keys = Object.keys(data[0]).filter(k => isMetricCol(k, data[0][k]));
  const emojis = ['◈','◉','◇','◆','▲','●','■','▶'];
  let idx = 0;

  keys.forEach(k => {
    const nums = data.map(d => parseFloat(d[k])).filter(v => !isNaN(v));
    if (!nums.length) return;
    const sum = nums.reduce((a,b)=>a+b,0);
    container.innerHTML += `
      <div class="card" style="animation-delay:${idx*0.04}s">
        <div class="card-label">${k}</div>
        <div class="card-value">${fmtNum(sum)}</div>
        <div class="card-change">↑ active</div>
        <div class="card-bg">${emojis[idx % emojis.length]}</div>
      </div>`;
    idx++;
  });

  if (!idx) container.innerHTML = `<div class="state-msg">No numeric metrics found</div>`;
}

/* ── Dept charts: line/bar + doughnut (Visible only on Department views) ── */
function renderDeptCharts(data, sheetName) {
  const area = document.getElementById('charts-area');
  area.innerHTML = `
    <div class="charts-row" style="margin-bottom:24px">
      <div class="chart-card">
        <div class="chart-header">
          <div class="chart-title">Trend</div>
          <div class="chart-tag" id="dept-metric-tag">—</div>
        </div>
        <canvas id="dept-line" style="max-height:200px"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-header">
          <div class="chart-title">Distribution</div>
          <div class="chart-tag">Summary</div>
        </div>
        <canvas id="dept-donut" style="max-height:200px"></canvas>
      </div>
    </div>
  `;

  const metricKeys = Object.keys(data[0]).filter(k => isMetricCol(k, data[0][k]));
  const firstKey = metricKeys[0];
  if (!firstKey) return;

  document.getElementById('dept-metric-tag').textContent = firstKey;
  
  // Get the color for the current department
  const deptColor = OVERVIEW_SHEETS.find(d => d.key === sheetName)?.color || '#f97316';

  // MAIN CHART (Keeping your Bar Chart logic!)
  requestAnimationFrame(() => {
    const ctx = document.getElementById('dept-line').getContext('2d');
    const labels = data.map(d => d['Date'] || d['date'] || '');
    
    const values = data.map(d => {
      const v = parseFloat(d[firstKey]);
      return isNaN(v) ? null : v;
    });

    const grad = ctx.createLinearGradient(0, 0, 0, 200);
    grad.addColorStop(0, deptColor + 'dd');
    grad.addColorStop(1, deptColor + '33');

    const c1 = new Chart(ctx, {
      type: 'bar', // Kept your bar chart!
      data: { 
        labels, 
        datasets: [{ 
          label: firstKey, 
          data: values,
          borderColor: deptColor, 
          backgroundColor: grad, 
          borderWidth: 1,
          borderRadius: 4,
          borderSkipped: false
        }] 
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{display:false}, tooltip:{backgroundColor:'#ffffff',borderColor:'rgba(0,0,0,0.1)',borderWidth:1,titleColor:deptColor,bodyColor:'#0f172a',padding:10} },
        scales:{
          x:{ ticks:{maxTicksLimit:8,color:'#64748b',font:{size:9}}, grid:{color:'rgba(0,0,0,0.03)'} },
          y:{ beginAtZero: true, ticks:{color:'#64748b',font:{size:9}}, grid:{color:'rgba(0,0,0,0.03)'} }
        }
      }
    });
    activeCharts.push(c1);
  });

  // DONUT CHART
  requestAnimationFrame(() => {
    const ctx2 = document.getElementById('dept-donut').getContext('2d');
    const topKeys = metricKeys.slice(0, 6);
    const sums = topKeys.map(k => data.reduce((s,d)=>s+(parseFloat(d[k])||0),0));
    const colors = ['#f97316','#fb923c','#60a5fa','#34d399','#a78bfa','#f87171'];

    const c2 = new Chart(ctx2, {
      type: 'doughnut',
      data: { labels: topKeys, datasets:[{ data:sums,
        backgroundColor:colors.map(c=>c+'dd'), borderColor:colors, borderWidth:2, hoverOffset:4 }] },
      options: {
        responsive:true,
        plugins:{
          legend:{position:'bottom',labels:{color:'#64748b',font:{size:9},padding:8,boxWidth:10}},
          tooltip:{backgroundColor:'#ffffff',borderColor:'rgba(0,0,0,0.1)',borderWidth:1,titleColor:deptColor,bodyColor:'#0f172a',padding:10}
        },
        cutout:'65%'
      }
    });
    activeCharts.push(c2);
  });
}

/* ── Table ── */
function renderTable(data) {
  const thead = document.querySelector("#table thead");
  const tbody = document.querySelector("#table tbody");
  thead.innerHTML = ""; tbody.innerHTML = "";
  document.getElementById('row-count').textContent = `${data.length} rows`;
  if (!data.length) { tbody.innerHTML=`<tr><td colspan="99"><div class="state-msg">No rows</div></td></tr>`; return; }

  const headers = Object.keys(data[0]);
  thead.innerHTML = "<tr>" + headers.map(h=>`<th>${h}</th>`).join("") + "</tr>";

  const CHUNK = 50;
  data.slice(0, CHUNK).forEach(row => {
    const tr = document.createElement('tr');
    tr.innerHTML = headers.map(h=>`<td>${row[h]??'—'}</td>`).join('');
    tbody.appendChild(tr);
  });

  if (data.length > CHUNK) {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td colspan="${headers.length}" style="text-align:center;color:var(--muted);font-size:10px;padding:12px">Showing ${CHUNK} of ${data.length} rows</td>`;
    tbody.appendChild(tr);
  }
}

loadMainDashboard();
</script>
