<!DOCTYPE html>
<html>
<head>
  <title>OPS Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      background: #0f172a;
      color: white;
    }

    .sidebar {
      width: 220px;
      background: #1e293b;
      height: 100vh;
      padding: 20px;
    }

    .sidebar h2 {
      color: #f97316;
    }

    .menu div {
      padding: 10px;
      cursor: pointer;
      border-radius: 8px;
      margin-bottom: 5px;
    }

    .menu div:hover {
      background: #334155;
    }

    .active {
      background: #f97316;
    }

    .main {
      flex: 1;
      padding: 20px;
    }

    .filters {
      margin-bottom: 20px;
    }

    input {
      padding: 8px;
      border-radius: 6px;
    }

    button {
      background: #f97316;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    canvas {
      background: #1e293b;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      background: #1e293b;
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 8px;
      border-bottom: 1px solid #334155;
    }
  </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>OPS Dashboard</h2>

  <div class="menu">
    <div onclick="loadPage('main')" class="active">Main Dashboard</div>
    <div onclick="loadPage('Daily Dashboard')">Sales</div>
    <div onclick="loadPage('Marketing Metrics')">Marketing</div>
    <div onclick="loadPage('Product Metrics')">Product</div>
    <div onclick="loadPage('Finance')">Finance</div>
    <div onclick="loadPage('Supply Chain')">Supply Chain</div>
    <div onclick="loadPage('HR')">HR</div>
  </div>
</div>

<!-- Main -->
<div class="main">

  <h2 id="title">Main Dashboard</h2>

  <div class="filters">
    <input type="date" id="start">
    <input type="date" id="end">
    <button onclick="applyFilter()">Apply</button>
  </div>

  <div class="grid" id="kpis"></div>

  <div id="charts-area"></div>

  <table id="table">
    <thead></thead>
    <tbody></tbody>
  </table>

</div>

<script>

const API = "YOUR_PUBLIC_URL";

let currentSheet = "main";
let charts = [];

// Metric mapping
const METRIC_MAP = {
  "Daily Dashboard": "Revenue (₹)",
  "Marketing Metrics": "Leads",
  "Finance": "Collections (₹)",
  "Product Metrics": "Attendance %",
  "Supply Chain": "Orders Placed",
  "HR": "Joinings"
};

// Clean number
function cleanNumber(val) {
  return parseFloat(String(val).replace(/[^0-9.-]+/g,"")) || 0;
}

// Fetch
async function fetchData(sheet, start, end) {
  let url = `${API}?action=getData&sheet=${sheet}`;

  if (start && end) {
    url += `&start=${start}&end=${end}`;
  }

  const res = await fetch(url);
  return await res.json();
}

// Apply filter
function applyFilter() {
  const start = document.getElementById("start").value;
  const end = document.getElementById("end").value;

  loadPage(currentSheet, start, end);
}

// Load page
async function loadPage(sheet, start, end) {
  currentSheet = sheet;
  document.getElementById("title").innerText = sheet;

  if (sheet === "main") {
    loadMain(start, end);
  } else {
    loadDept(sheet, start, end);
  }
}

// MAIN DASHBOARD
async function loadMain(start, end) {

  const sheets = Object.keys(METRIC_MAP);

  let all = [];

  for (let s of sheets) {
    const data = await fetchData(s, start, end);

    all.push({ sheet: s, data });
  }

  renderMainKPIs(all);
  renderMainCharts(all);
}

// KPIs
function renderMainKPIs(all) {
  const container = document.getElementById("kpis");
  container.innerHTML = "";

  all.forEach(d => {
    if (!d.data.length) return;

    const metric = METRIC_MAP[d.sheet];
    const sum = d.data.reduce((a,b)=>a+cleanNumber(b[metric]),0);

    container.innerHTML += `
      <div class="card">
        <h4>${d.sheet}</h4>
        <h2>${sum.toLocaleString()}</h2>
      </div>
    `;
  });
}

// Charts
function renderMainCharts(all) {
  destroyCharts();
  const area = document.getElementById("charts-area");
  area.innerHTML = "";

  all.forEach(d => {
    if (!d.data.length) return;

    const metric = METRIC_MAP[d.sheet];

    const canvas = document.createElement("canvas");
    area.appendChild(canvas);

    const labels = d.data.map(r => r["Date"]);
    const values = d.data.map(r => cleanNumber(r[metric]));

    const chart = new Chart(canvas, {
      type: "line",
      data: {
        labels,
        datasets: [{
          label: d.sheet,
          data: values
        }]
      }
    });

    charts.push(chart);
  });
}

// DEPARTMENT PAGE
async function loadDept(sheet, start, end) {

  const data = await fetchData(sheet, start, end);

  if (!data.length) {
    document.getElementById("kpis").innerHTML = "No Data";
    return;
  }

  renderKPIs(data);
  renderDeptChart(sheet, data);
  renderTable(data);
}

// KPI per dept
function renderKPIs(data) {
  const container = document.getElementById("kpis");
  container.innerHTML = "";

  const keys = Object.keys(data[0]);

  keys.forEach(k => {
    const nums = data.map(d => cleanNumber(d[k])).filter(v => v !== 0);

    if (!nums.length) return;

    const sum = nums.reduce((a,b)=>a+b,0);

    container.innerHTML += `
      <div class="card">
        <h4>${k}</h4>
        <h2>${sum.toLocaleString()}</h2>
      </div>
    `;
  });
}

// Dept chart
function renderDeptChart(sheet, data) {
  destroyCharts();

  const area = document.getElementById("charts-area");
  area.innerHTML = "";

  const metric = METRIC_MAP[sheet];

  const canvas = document.createElement("canvas");
  area.appendChild(canvas);

  const labels = data.map(d => d["Date"]);
  const values = data.map(d => cleanNumber(d[metric]));

  const chart = new Chart(canvas, {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: metric,
        data: values
      }]
    }
  });

  charts.push(chart);
}

// Table
function renderTable(data) {
  const thead = document.querySelector("#table thead");
  const tbody = document.querySelector("#table tbody");

  thead.innerHTML = "";
  tbody.innerHTML = "";

  const headers = Object.keys(data[0]);

  thead.innerHTML = "<tr>" + headers.map(h => `<th>${h}</th>`).join("") + "</tr>";

  data.forEach(row => {
    tbody.innerHTML += "<tr>" + headers.map(h => `<td>${row[h]}</td>`).join("") + "</tr>";
  });
}

// Destroy charts
function destroyCharts() {
  charts.forEach(c => c.destroy());
  charts = [];
}

// Init
loadMain();

</script>

</body>
</html>
